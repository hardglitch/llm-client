name: Release Builds (Multi-OS)

on:
  push:
    tags:
      - "v*"  # запускаем только на тегах вида v1.0.0

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: stable

jobs:
  build-multi-os:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact-name: llm-client-linux-x86_64
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact-name: llm-client-macos-x86_64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: llm-client-windows-x86_64.exe
            ext: ".exe"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename and prepare artifact
        run: |
          BINARY_PATH="target/${{ matrix.target }}/release/llm-client${{ matrix.ext }}"
          mv "$BINARY_PATH" "${{ matrix.artifact-name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-name }}
          retention-days: 7

  create-release:
    needs: build-multi-os
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: releases

      - name: Create GitHub Release
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body: |
            ## Changelog
            First stable release.

            ### Binaries
            - [Linux x86_64](releases/llm-client-linux-x86_64)
            - [macOS x86_64](releases/llm-client-macos-x86_64)
            - [Windows x86_64](releases/llm-client-windows-x86_64.exe)
          draft: false
          prerelease: false

      - name: Upload binaries to release
        run: |
          for file in releases/*; do
            gh release upload "${{ steps.create_release.outputs.id }}" "$file" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
